app = "dhc-dashboard"
primary_region = "lhr"
kill_signal = "SIGTERM"

[build]
  dockerfile = "apps/phoenix/Dockerfile"

[deploy]
  release_command = "fnox exec --profile production -- /app/bin/dhc eval 'Dhc.Release.migrate()'"

[env]
  APP_URL = "https://dashboard.dublinhemaclub.com"
  DNS_CLUSTER_QUERY = "dhc-dashboard.internal"
  ECTO_IPV6 = "true"
  FNOX_IF_MISSING = "error"
  FNOX_PROFILE = "production"
  PHX_HOST = "dhc-dashboard.fly.dev"
  PHX_SERVER = "true"
  POOL_SIZE = "5"
  PORT = "8080"
  CORS_ALLOWED_ORIGINS = "https://dashboard.dublinhemaclub.com"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    timeout = "2s"
    path = "/api/health"

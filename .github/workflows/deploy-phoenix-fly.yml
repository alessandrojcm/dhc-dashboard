name: Deploy Phoenix API to Fly.io

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-phoenix-fly
  cancel-in-progress: false

permissions:
  contents: read

env:
  FLY_APP: ${{ vars.FLY_PHOENIX_APP || 'dhc-dashboard' }}
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      phoenix: ${{ steps.filter.outputs.phoenix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            phoenix:
              - 'apps/phoenix/**'
              - 'fly.toml'
              - 'fnox.toml'
              - '.github/workflows/deploy-phoenix-fly.yml'

  deploy:
    needs: changes
    if: needs.changes.outputs.phoenix == 'true'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise tools
        uses: jdx/mise-action@v3
        with:
          install: true

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Phoenix release
        run: flyctl deploy --app "${FLY_APP}" --remote-only

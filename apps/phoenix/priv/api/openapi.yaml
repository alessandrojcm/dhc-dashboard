openapi: 3.0.3
info:
  title: DHC Dashboard API
  description: |
    Dublin Hema Club dashboard API.

    **Auth**: Phoenix validates Supabase JWT. Pass as `Authorization: Bearer <token>`.
  version: 0.1.0

servers:
  - url: /api
    description: Relative path (same origin)

paths:
  /health:
    get:
      operationId: health.index
      tags:
        - Health
      summary: Health check
      description: Returns a static status response. Used to verify the API is reachable.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok

  /webhooks/stripe:
    post:
      operationId: stripeWebhooks.create
      tags:
        - StripeWebhooks
      summary: Handle Stripe webhook events
      description: |
        Receives Stripe webhook events, validates the Stripe-Signature header
        using HMAC-SHA256, and enqueues an Oban job for background processing.

        This endpoint is unauthenticated â€” Stripe sends webhooks without auth tokens.
        Signature verification is the authentication mechanism.

        Returns 200 immediately after validation + enqueue (Stripe requires fast responses).
        Returns 400 for invalid or missing signatures.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: Stripe event ID (e.g. evt_1abc)
                object:
                  type: string
                  example: event
                type:
                  type: string
                  description: Stripe event type (e.g. charge.succeeded)
                  enum:
                    - charge.succeeded
                    - charge.expired
                    - charge.refunded
                    - customer.subscription.created
                    - customer.subscription.updated
                    - customer.subscription.deleted
                    - customer.subscription.paused
                    - customer.subscription.resumed
                    - customer.subscription.pending_update_applied
                    - customer.subscription.pending_update_expired
                    - customer.subscription.trial_will_end
                    - invoice.paid
                    - invoice.payment_failed
                    - invoice.payment_action_required
                    - invoice.upcoming
                    - invoice.marked_uncollectible
                    - invoice.payment_succeeded
                    - payment_intent.succeeded
                    - payment_intent.payment_failed
                    - payment_intent.canceled
                data:
                  type: object
                  description: Event payload
                created:
                  type: integer
                  description: Unix timestamp when the event was created
                livemode:
                  type: boolean
                  description: Whether the event was in live mode
                pending_webhooks:
                  type: integer
                  description: Number of pending webhooks
                request:
                  type: object
                  description: Request details (id and idempotency_key)
                api_version:
                  type: string
                  description: Stripe API version
      responses:
        "200":
          description: Event validated and enqueued for processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      received:
                        type: boolean
                        example: true
                      event_id:
                        type: string
                        description: Oban job ID
        "400":
          description: Invalid or missing Stripe signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /invitations:
    get:
      operationId: invitations.list
      tags:
        - Invitations
      summary: List member invitations
      description: |
        Returns a domain-shaped, cursor-paginated list of member invitations
        for the dashboard table.

        The server always filters to `pending` and `expired` invitations,
        matching the previous hardcoded client filter. The `status` field is
        still returned in the DTO so the UI can render the badge, but there is
        no `status` query param â€” `accepted`/`revoked` rows are never returned.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `admin`, `president`, or `committee_coordinator`.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            enum: [10, 25, 50, 100]
            default: 10
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque cursor returned by a previous response.
        - name: q
          in: query
          schema:
            type: string
          description: Websearch-style full text query over `invitations.search_text`.
        - name: sort
          in: query
          schema:
            $ref: "#/components/schemas/InvitationListSortField"
            default: createdAt
        - name: direction
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Cursor-paginated member invitations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationListResponse"
        "400":
          description: Invalid query parameter or mismatched cursor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks an invitation admin role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: invitations.create
      tags:
        - Invitations
      summary: Enqueue bulk member invitations
      description: |
        Enqueues a Phoenix/Oban bulk invitation job. This replaces the
        `bulk_invite_with_subscription` Supabase edge function invocation.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `president`, `admin`, or `committee_coordinator`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvitationCreateRequest"
      responses:
        "202":
          description: Bulk invitation job accepted for background processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationCreateResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks an invitation admin role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /invitations/resend:
    post:
      operationId: invitations.resend
      tags:
        - Invitations
      summary: Resend existing member invitations
      description: |
        Re-enqueues invite-member emails through the Phoenix Email Oban worker.
        This replaces the SvelteKit service-layer `pgmq.send_batch('email_queue', ...)`
        producer used by invitation resend actions.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `president`, `admin`, or `committee_coordinator`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvitationResendCreateRequest"
      responses:
        "202":
          description: Resend emails accepted for background processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationResendCreateResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks an invitation admin role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /waitlist/status:
    get:
      operationId: waitlist.status
      tags:
        - Waitlist
      summary: Read public waitlist status
      description: |
        Returns whether the public beginners workshop waitlist is currently open.

        This endpoint is public and intentionally exposes only the domain-shaped
        waitlist status, not the generic settings table.
      responses:
        "200":
          description: Waitlist status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistStatusResponse"

  /waitlist/analytics:
    get:
      operationId: waitlist.analytics
      tags:
        - Waitlist
      summary: Read waitlist analytics
      description: |
        Returns dashboard analytics for current beginners workshop waitlist entries.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `admin`, `president`, `committee_coordinator`, `beginners_coordinator`, or `coach`.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Waitlist analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistAnalyticsResponse"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks a waitlist admin role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /waitlist/entries:
    get:
      operationId: waitlist.entries
      tags:
        - Waitlist
      summary: List waitlist entries
      description: |
        Returns a domain-shaped, cursor-paginated list of beginners workshop
        waitlist entries for the dashboard table.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `admin`, `president`, `committee_coordinator`, `beginners_coordinator`, or `coach`.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            enum: [10, 25, 50, 100]
            default: 10
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque cursor returned by a previous response.
        - name: q
          in: query
          schema:
            type: string
          description: Websearch-style full text query.
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/WaitlistStatus"
          description: Defaults to all statuses except `joined`; pass `joined` explicitly to include joined entries only.
        - name: sort
          in: query
          schema:
            $ref: "#/components/schemas/WaitlistEntriesSortField"
            default: position
        - name: direction
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: Cursor-paginated waitlist entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistEntriesResponse"
        "400":
          description: Invalid query parameter or mismatched cursor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks a waitlist admin role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notifications:
    get:
      operationId: notifications.list
      tags:
        - Notifications
      summary: List current user notifications
      description: |
        Returns the authenticated user's in-app notifications in newest-first
        order plus the unread notification count. This endpoint mirrors the
        old `notifications.user_id = auth.uid()` RLS boundary: users can only
        read notifications generated for their own Supabase Auth user id.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            enum: [10, 25, 50]
            default: 10
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque cursor returned by a previous response.
      responses:
        "200":
          description: Cursor-paginated notifications for the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsListResponse"
        "400":
          description: Invalid query parameter or mismatched cursor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /members:
    get:
      operationId: members.list
      tags:
        - Members
      summary: List members
      description: |
        Returns a domain-shaped, cursor-paginated list of members for the
        dashboard table, replacing the browser-side PostgREST read over
        `member_management_view`.

        `membershipStatus` is computed server-side, reproducing the legacy
        view's CASE: `inactive` when `user_profiles.is_active = false`;
        `paused` when `member_profiles.subscription_paused_until` is not null
        and greater than `now()`; otherwise `active`. This is distinct from
        the Member's `isActive` flag â€” a paused member has
        `isActive: true, membershipStatus: "paused"`.

        Member email is read directly from `auth.users` via the `AuthUser`
        schema (no PostgREST-era helper function). Internal/leaky fields
        (`searchText`, `userProfileId`, `createdAt`, `updatedAt`, `roles`,
        `additionalData`, `fromWaitlistId`, `waitlistRegistrationDate`) are
        not exposed.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of the
        broad committee roles: `admin`, `president`, `treasurer`,
        `committee_coordinator`, `sparring_coordinator`, `workshop_coordinator`,
        `beginners_coordinator`, `quartermaster`, `pr_manager`,
        `volunteer_coordinator`, `research_coordinator`, or `coach`. A `member`
        role 403s; a missing token 401s.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            enum: [10, 25, 50, 100]
            default: 10
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque cursor returned by a previous response. Binds to the query params (limit, sort, direction, membershipStatus, q); a mismatched cursor returns 400.
        - name: q
          in: query
          schema:
            type: string
          description: Websearch-style full text query over `user_profiles.search_text`.
        - name: membershipStatus
          in: query
          schema:
            type: string
          description: |
            Comma-separated list of membership statuses to include. Absent or
            empty returns all statuses (no filter). Example: `active,paused`.
            Valid values: `active`, `inactive`, `paused`.
        - name: sort
          in: query
          schema:
            $ref: "#/components/schemas/MembersListSortField"
            default: lastName
        - name: direction
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: Cursor-paginated members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembersListResponse"
        "400":
          description: Invalid query parameter or mismatched cursor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks a broad committee role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /members/insurance-form:
    get:
      operationId: members.insuranceForm
      tags:
        - Members
      summary: Read the member insurance form link
      description: |
        Returns the URL of the HEMA insurance form link configured for members.

        Exposes a specific domain read, not a generic settings proxy: the
        `Dhc.Members` context owns the `hema_insurance_form_link` settings read.

        Any authenticated user (valid Supabase JWT) may read this; no committee
        role is required, mirroring the `settings` SELECT RLS policy
        (`USING (true)` for authenticated). A member can read the insurance
        form link on their own profile.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Insurance form link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembersInsuranceFormResponse"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /members/analytics:
    get:
      operationId: members.analytics
      tags:
        - Members
      summary: Read members analytics
      description: |
        Returns dashboard analytics for active members, computed server-side
        over `member_profiles` joined to `user_profiles` where `is_active = true`.

        Replaces the five browser-side PostgREST aggregate queries over
        `member_management_view` with a single domain-shaped read. The
        `preferred_weapon[]` array is unnested and counted in SQL so the
        browser no longer downloads every active member's weapon array to
        count it in JavaScript. Raw enum strings are returned for weapons;
        the UI keeps doing display prettification.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of the
        broad committee roles: `admin`, `president`, `treasurer`,
        `committee_coordinator`, `sparring_coordinator`, `workshop_coordinator`,
        `beginners_coordinator`, `quartermaster`, `pr_manager`,
        `volunteer_coordinator`, `research_coordinator`, or `coach`. This
        mirrors the `user_profiles` SELECT RLS policy for broad committee
        roles. A `member` role 403s; a missing token 401s.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Members analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembersAnalyticsResponse"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks a broad committee role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workshops/calendar:
    get:
      operationId: workshops.calendar
      tags:
        - Workshops
      summary: Read the coordinator Workshop calendar
      description: |
        Returns non-cancelled Workshops for the coordinator management
        calendar, replacing the browser-side PostgREST read over
        `club_activities` joined to `club_activity_interest_counts` and
        `club_activity_registrations`.

        Each Workshop carries scheduling, pricing, and status fields, the
        interest count, and total pending/confirmed registration counts â€”
        the demand and attendance signals a coordinator needs. The DTO does
        NOT carry current-user registration or interest state: the old
        `user_interest` / `user_registrations` PostgREST joins were
        current-user artifacts that leaked into the management view and are
        intentionally dropped (PRD #142).

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `workshop_coordinator`, `president`, or `admin`. This mirrors the
        corrected `club_activity_registrations` RLS policy
        (`20250923100806_fix_workshops_rls.sql`) and does NOT reproduce the
        historical `beginners_coordinator` registration-visibility drift.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Coordinator Workshop calendar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkshopCalendarResponse"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks a workshop coordinator role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    InvitationCreateRequest:
      type: object
      required:
        - invites
      properties:
        invites:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/InvitationCreateInvite"
    InvitationCreateInvite:
      type: object
      required:
        - firstName
        - lastName
        - email
        - phoneNumber
        - dateOfBirth
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phoneNumber:
          type: string
        dateOfBirth:
          type: string
          format: date
    InvitationCreateResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            queued:
              type: boolean
              example: true
            job_id:
              type: integer
              description: Oban job ID
    InvitationResendCreateRequest:
      type: object
      required:
        - emails
      properties:
        emails:
          type: array
          minItems: 1
          items:
            type: string
            format: email
    InvitationResendCreateResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            succeeded:
              type: integer
            failed:
              type: integer
    InvitationStatus:
      type: string
      enum:
        - pending
        - accepted
        - expired
        - revoked
      description: |
        Invitation lifecycle status. The list endpoint always filters to
        `pending` and `expired`; `accepted`/`revoked` rows are never returned.
        The field is still present in the DTO for UI badge rendering.
    InvitationListSortField:
      type: string
      enum:
        - email
        - status
        - expiresAt
        - createdAt
    InvitationListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - invitations
            - totalCount
            - limit
            - nextCursor
            - previousCursor
          properties:
            invitations:
              type: array
              items:
                $ref: "#/components/schemas/Invitation"
            totalCount:
              type: integer
              minimum: 0
              description: Exact `COUNT(*)`, not estimated.
            limit:
              type: integer
              enum: [10, 25, 50, 100]
            nextCursor:
              type: string
              nullable: true
            previousCursor:
              type: string
              nullable: true
    Invitation:
      type: object
      required:
        - id
        - email
        - status
        - expiresAt
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        status:
          $ref: "#/components/schemas/InvitationStatus"
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    WaitlistStatusResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - isOpen
          properties:
            isOpen:
              type: boolean
              description: Whether the public waitlist accepts registrations.
    WaitlistAnalyticsResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - totalCount
            - averageAge
            - genderDistribution
            - ageDistribution
          properties:
            totalCount:
              type: integer
              minimum: 0
            averageAge:
              type: number
              format: double
              minimum: 0
            genderDistribution:
              type: array
              items:
                $ref: "#/components/schemas/WaitlistGenderDistributionItem"
            ageDistribution:
              type: array
              items:
                $ref: "#/components/schemas/WaitlistAgeDistributionItem"
    WaitlistGenderDistributionItem:
      type: object
      required:
        - gender
        - value
      properties:
        gender:
          type: string
        value:
          type: integer
          minimum: 0
    WaitlistAgeDistributionItem:
      type: object
      required:
        - age
        - value
      properties:
        age:
          type: integer
          minimum: 0
        value:
          type: integer
          minimum: 0
    WaitlistStatus:
      type: string
      enum:
        - waiting
        - invited
        - paid
        - deferred
        - cancelled
        - completed
        - no_reply
        - joined
    MembershipStatus:
      type: string
      enum:
        - active
        - inactive
        - paused
      description: |
        Membership lifecycle state for a member profile.

        - `active`: the membership is currently in good standing.
        - `inactive`: the membership has lapsed or been ended.
        - `paused`: the membership is temporarily suspended (e.g. via
          `subscription_paused_until`). Mirrors the paused-subscription case
          in the legacy `member_management_view` `membership_status` column.

        Referenced later by the members-list DTO `membershipStatus` field and
        the `membershipStatus` query parameter of the members-list endpoint.
    MembersListSortField:
      type: string
      enum:
        - firstName
        - lastName
        - email
        - phoneNumber
        - age
        - membershipStartDate
        - lastPaymentDate
        - subscriptionPausedUntil
        - isActive
    MembersListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - members
            - totalCount
            - limit
            - nextCursor
            - previousCursor
          properties:
            members:
              type: array
              items:
                $ref: "#/components/schemas/Member"
            totalCount:
              type: integer
              minimum: 0
            limit:
              type: integer
              enum: [10, 25, 50, 100]
            nextCursor:
              type: string
              nullable: true
            previousCursor:
              type: string
              nullable: true
    Member:
      type: object
      required:
        - id
        - firstName
        - lastName
        - email
        - phoneNumber
        - gender
        - pronouns
        - isActive
        - preferredWeapon
        - membershipStartDate
        - membershipEndDate
        - lastPaymentDate
        - insuranceFormSubmitted
        - age
        - socialMediaConsent
        - nextOfKinName

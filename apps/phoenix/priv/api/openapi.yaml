        age:
          type: integer
          minimum: 0
        initialRegistrationDate:
          type: string
          format: date-time
        lastContacted:
          type: string
          format: date-time
          nullable: true
        medicalConditions:
          type: string
          nullable: true
        adminNotes:
          type: string
          nullable: true
        socialMediaConsent:
          type: string

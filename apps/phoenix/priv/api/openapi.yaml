openapi: 3.0.3
info:
  title: DHC Dashboard API
  description: |
    Dublin Hema Club dashboard API.

    **Auth**: Phoenix validates Supabase JWT. Pass as `Authorization: Bearer <token>`.
  version: 0.1.0

servers:
  - url: /api
    description: Relative path (same origin)

paths:
  /health:
    get:
      operationId: health.index
      tags:
        - Health
      summary: Health check
      description: Returns a static status response. Used to verify the API is reachable.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok

  /webhooks/stripe:
    post:
      operationId: stripeWebhooks.create
      tags:
        - StripeWebhooks
      summary: Handle Stripe webhook events
      description: |
        Receives Stripe webhook events, validates the Stripe-Signature header
        using HMAC-SHA256, and enqueues an Oban job for background processing.

        This endpoint is unauthenticated — Stripe sends webhooks without auth tokens.
        Signature verification is the authentication mechanism.

        Returns 200 immediately after validation + enqueue (Stripe requires fast responses).
        Returns 400 for invalid or missing signatures.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: Stripe event ID (e.g. evt_1abc)
                object:
                  type: string
                  example: event
                type:
                  type: string
                  description: Stripe event type (e.g. charge.succeeded)
                  enum:
                    - charge.succeeded
                    - charge.expired
                    - charge.refunded
                    - customer.subscription.created
                    - customer.subscription.updated
                    - customer.subscription.deleted
                    - customer.subscription.paused
                    - customer.subscription.resumed
                    - customer.subscription.pending_update_applied
                    - customer.subscription.pending_update_expired
                    - customer.subscription.trial_will_end
                    - invoice.paid
                    - invoice.payment_failed
                    - invoice.payment_action_required
                    - invoice.upcoming
                    - invoice.marked_uncollectible
                    - invoice.payment_succeeded
                    - payment_intent.succeeded
                    - payment_intent.payment_failed
                    - payment_intent.canceled
                data:
                  type: object
                  description: Event payload
                created:
                  type: integer
                  description: Unix timestamp when the event was created
                livemode:
                  type: boolean
                  description: Whether the event was in live mode
                pending_webhooks:
                  type: integer
                  description: Number of pending webhooks
                request:
                  type: object
                  description: Request details (id and idempotency_key)
                api_version:
                  type: string
                  description: Stripe API version
      responses:
        "200":
          description: Event validated and enqueued for processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      received:
                        type: boolean
                        example: true
                      event_id:
                        type: string
                        description: Oban job ID
        "400":
          description: Invalid or missing Stripe signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /invitations:
    post:
      operationId: invitations.create
      tags:
        - Invitations
      summary: Enqueue bulk member invitations
      description: |
        Enqueues a Phoenix/Oban bulk invitation job. This replaces the
        `bulk_invite_with_subscription` Supabase edge function invocation.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `president`, `admin`, or `committee_coordinator`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvitationCreateRequest"
      responses:
        "202":
          description: Bulk invitation job accepted for background processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationCreateResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks an invitation admin role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /invitations/resend:
    post:
      operationId: invitations.resend
      tags:
        - Invitations
      summary: Resend existing member invitations
      description: |
        Re-enqueues invite-member emails through the Phoenix Email Oban worker.
        This replaces the SvelteKit service-layer `pgmq.send_batch('email_queue', ...)`
        producer used by invitation resend actions.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `president`, `admin`, or `committee_coordinator`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvitationResendCreateRequest"
      responses:
        "202":
          description: Resend emails accepted for background processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationResendCreateResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks an invitation admin role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /waitlist/status:
    get:
      operationId: waitlist.status
      tags:
        - Waitlist
      summary: Read public waitlist status
      description: |
        Returns whether the public beginners workshop waitlist is currently open.

        This endpoint is public and intentionally exposes only the domain-shaped
        waitlist status, not the generic settings table.
      responses:
        "200":
          description: Waitlist status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistStatusResponse"

  /waitlist/analytics:
    get:
      operationId: waitlist.analytics
      tags:
        - Waitlist
      summary: Read waitlist analytics
      description: |
        Returns dashboard analytics for current beginners workshop waitlist entries.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `admin`, `president`, `committee_coordinator`, `beginners_coordinator`, or `coach`.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Waitlist analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistAnalyticsResponse"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks a waitlist admin role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /waitlist/entries:
    get:
      operationId: waitlist.entries
      tags:
        - Waitlist
      summary: List waitlist entries
      description: |
        Returns a domain-shaped, cursor-paginated list of beginners workshop
        waitlist entries for the dashboard table.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `admin`, `president`, `committee_coordinator`, `beginners_coordinator`, or `coach`.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            enum: [10, 25, 50, 100]
            default: 10
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque cursor returned by a previous response.
        - name: q
          in: query
          schema:
            type: string
          description: Websearch-style full text query.
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/WaitlistStatus"
          description: Defaults to all statuses except `joined`; pass `joined` explicitly to include joined entries only.
        - name: sort
          in: query
          schema:
            $ref: "#/components/schemas/WaitlistEntriesSortField"
            default: position
        - name: direction
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: Cursor-paginated waitlist entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistEntriesResponse"
        "400":
          description: Invalid query parameter or mismatched cursor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks a waitlist admin role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notifications:
    get:
      operationId: notifications.list
      tags:
        - Notifications
      summary: List current user notifications
      description: |
        Returns the authenticated user's in-app notifications in newest-first
        order plus the unread notification count. This endpoint mirrors the
        old `notifications.user_id = auth.uid()` RLS boundary: users can only
        read notifications generated for their own Supabase Auth user id.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            enum: [10, 25, 50]
            default: 10
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque cursor returned by a previous response.
      responses:
        "200":
          description: Cursor-paginated notifications for the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsListResponse"
        "400":
          description: Invalid query parameter or mismatched cursor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    InvitationCreateRequest:
      type: object
      required:
        - invites
      properties:
        invites:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/InvitationCreateInvite"
    InvitationCreateInvite:
      type: object
      required:
        - firstName
        - lastName
        - email
        - phoneNumber
        - dateOfBirth
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phoneNumber:
          type: string
        dateOfBirth:
          type: string
          format: date
    InvitationCreateResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            queued:
              type: boolean
              example: true
            job_id:
              type: integer
              description: Oban job ID
    InvitationResendCreateRequest:
      type: object
      required:
        - emails
      properties:
        emails:
          type: array
          minItems: 1
          items:
            type: string
            format: email
    InvitationResendCreateResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            succeeded:
              type: integer
            failed:
              type: integer
    WaitlistStatusResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - isOpen
          properties:
            isOpen:
              type: boolean
              description: Whether the public waitlist accepts registrations.
    WaitlistAnalyticsResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - totalCount
            - averageAge
            - genderDistribution
            - ageDistribution
          properties:
            totalCount:
              type: integer
              minimum: 0
            averageAge:
              type: number
              format: double
              minimum: 0
            genderDistribution:
              type: array
              items:
                $ref: "#/components/schemas/WaitlistGenderDistributionItem"
            ageDistribution:
              type: array
              items:
                $ref: "#/components/schemas/WaitlistAgeDistributionItem"
    WaitlistGenderDistributionItem:
      type: object
      required:
        - gender
        - value
      properties:
        gender:
          type: string
        value:
          type: integer
          minimum: 0
    WaitlistAgeDistributionItem:
      type: object
      required:
        - age
        - value
      properties:
        age:
          type: integer
          minimum: 0
        value:
          type: integer
          minimum: 0
    WaitlistStatus:
      type: string
      enum:
        - waiting
        - invited
        - paid
        - deferred
        - cancelled
        - completed
        - no_reply
        - joined
    WaitlistEntriesSortField:
      type: string
      enum:
        - position
        - fullName
        - status
        - age
        - initialRegistrationDate
        - lastContacted
        - lastStatusChange
    WaitlistEntriesResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - entries
            - totalCount
            - limit
            - nextCursor
            - previousCursor
          properties:
            entries:
              type: array
              items:
                $ref: "#/components/schemas/WaitlistEntry"
            totalCount:
              type: integer
              minimum: 0
            limit:
              type: integer
              enum: [10, 25, 50, 100]
            nextCursor:
              type: string
              nullable: true
            previousCursor:
              type: string
              nullable: true
    WaitlistEntry:
      type: object
      required:
        - id
        - position
        - fullName
        - email
        - phoneNumber
        - status
        - age
        - initialRegistrationDate
        - socialMediaConsent
        - insuranceFormSubmitted
        - lastStatusChange
      properties:
        id:
          type: string
          format: uuid
        position:
          type: integer
          minimum: 1
        fullName:
          type: string
        email:
          type: string
          format: email
        phoneNumber:
          type: string
        status:
          $ref: "#/components/schemas/WaitlistStatus"
        age:
          type: integer
          minimum: 0
        initialRegistrationDate:
          type: string
          format: date-time
        lastContacted:
          type: string
          format: date-time
          nullable: true
        medicalConditions:
          type: string
          nullable: true
        adminNotes:
          type: string
          nullable: true
        socialMediaConsent:
          type: string
          enum: [no, yes_recognizable, yes_unrecognizable]
        guardianFirstName:
          type: string
          nullable: true
        guardianLastName:
          type: string
          nullable: true
        guardianPhoneNumber:
          type: string
          nullable: true
        insuranceFormSubmitted:
          type: boolean
        lastStatusChange:
          type: string
          format: date-time
    NotificationsListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - notifications
            - unreadCount
            - nextCursor
          properties:
            notifications:
              type: array
              items:
                $ref: "#/components/schemas/Notification"
            unreadCount:
              type: integer
              minimum: 0
            nextCursor:
              type: string
              nullable: true
    Notification:
      type: object
      required:
        - id
        - body
        - createdAt
        - readAt
      properties:
        id:
          type: string
          format: uuid
        body:
          type: string
        createdAt:
          type: string
          format: date-time
        readAt:
          type: string
          format: date-time
          nullable: true
    Error:
      type: object
      properties:
        errors:
          type: object
          properties:
            detail:
              type: string

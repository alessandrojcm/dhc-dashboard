        Workshop lifecycle status (persistence: `club_activity_status` enum).
        The coordinator calendar returns non-cancelled Workshops only.
    WorkshopCalendarItem:
      type: object
      required:
        - id
        - title
        - description
        - location
        - startDate
        - endDate
        - maxCapacity
        - priceMember
        - priceNonMember
        - isPublic
        - refundDays
        - status
        - announceDiscord
        - announceEmail
        - createdBy
        - interestCount
        - pendingRegistrationCount
        - confirmedRegistrationCount
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        maxCapacity:
          type: integer
          minimum: 0
          nullable: true
        priceMember:
          type: number
          description: "Member price in cents (persistence: `price_member`)."
          nullable: true
        priceNonMember:
          type: number
          description: "Non-member price in cents (persistence: `price_non_member`)."
          nullable: true
        isPublic:
          type: boolean
        refundDays:
          type: integer
          minimum: 0
        status:
          $ref: "#/components/schemas/WorkshopStatus"
        announceDiscord:
          type: boolean
        announceEmail:
          type: boolean
        createdBy:
          type: string
          format: uuid
          nullable: true
          description: Supabase auth user id of the Workshop creator, or null.
        interestCount:
          type: integer
          minimum: 0
          description: Number of members who have expressed interest in the Workshop.
        pendingRegistrationCount:
          type: integer
          minimum: 0
          description: Total pending registrations (counts toward availability).
        confirmedRegistrationCount:
          type: integer
          minimum: 0
          description: Total confirmed registrations (counts toward availability).
    WorkshopCalendarResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - workshops
          properties:
            workshops:
              type: array
              items:
                $ref: "#/components/schemas/WorkshopCalendarItem"
    Error:
      type: object
      properties:
        errors:

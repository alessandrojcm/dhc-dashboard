        - readAt
      properties:
        id:
          type: string
          format: uuid
        body:
          type: string
        createdAt:
          type: string
          format: date-time
        readAt:
          type: string
          format: date-time
          nullable: true
    MembersInsuranceFormResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - link
          properties:
            link:
              type: string
              nullable: true
              description: URL of the HEMA insurance form, or null when not configured.
    MembersAnalyticsResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - totalCount
            - averageAge
            - genderDistribution
            - ageDistribution
            - weaponDistribution
          properties:
            totalCount:
              type: integer
              minimum: 0
              description: Count of active members.
            averageAge:
              type: number
              format: double
              minimum: 0
              description: Average age of active members with a known date of birth (0 when none).
            genderDistribution:
              type: array
              items:
                $ref: "#/components/schemas/MembersGenderDistributionItem"
            ageDistribution:
              type: array
              items:
                $ref: "#/components/schemas/MembersAgeDistributionItem"
            weaponDistribution:
              type: array
              items:
                $ref: "#/components/schemas/MembersWeaponDistributionItem"
    MembersGenderDistributionItem:
      type: object
      required:
        - gender
        - value
      properties:
        gender:
          type: string
        value:
          type: integer
          minimum: 0
    MembersAgeDistributionItem:
      type: object
      required:
        - age
        - value
      properties:
        age:
          type: integer
          minimum: 0
        value:
          type: integer
          minimum: 0
    MembersWeaponDistributionItem:
      type: object
      required:
        - weapon
        - value
      properties:
        weapon:
          type: string
          description: Raw preferred_weapon enum string (the UI prettifies for display).
        value:
          type: integer
          minimum: 0
    WorkshopStatus:
      type: string
      enum:
        - planned
        - published
        - finished
        - cancelled
      description: |
        Workshop lifecycle status (persistence: `club_activity_status` enum).
        The coordinator calendar returns non-cancelled Workshops only; the
        member-safe collection only ever returns `planned` and `published`.
    RegistrationStatus:
      type: string
      enum:
        - pending
        - confirmed
        - cancelled
        - refunded
      description: |
        Workshop registration lifecycle state. `pending` and `confirmed` count
        toward availability; `cancelled` and `refunded` do not.
    WorkshopRegistration:
      type: object
      required:
        - id
        - status
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/RegistrationStatus"
      description: |
        The authenticated member's own registration for a Workshop. Exposed only
        as the current user's state (`currentUserRegistration`) on the
        member-safe collection — never as a list of other members' registrations.
    WorkshopAttendeesResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - workshop
            - attendees
            - refunds
          properties:
            workshop:
              $ref: "#/components/schemas/WorkshopSummary"
            attendees:
              type: array
              items:
                $ref: "#/components/schemas/WorkshopAttendee"
            refunds:
              type: array
              items:
                $ref: "#/components/schemas/WorkshopRefund"
    WorkshopSummary:
      type: object
      required:
        - id
        - title
        - isPublic
        - status
        - interestCount
        - pendingRegistrationCount
        - confirmedRegistrationCount
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        startDate:
          type: string
          format: date-time
          nullable: true
        endDate:
          type: string
          format: date-time
          nullable: true
        maxCapacity:
          type: integer
          minimum: 0
          nullable: true
        priceMember:
          type: number
          nullable: true
        priceNonMember:
          type: number
          nullable: true
        isPublic:
          type: boolean
        refundDays:
          type: integer
          minimum: 0
          nullable: true
        status:
          type: string
          enum: [planned, published, cancelled, finished]
        interestCount:
          type: integer
          minimum: 0
        pendingRegistrationCount:
          type: integer
          minimum: 0
        confirmedRegistrationCount:
          type: integer
          minimum: 0
    WorkshopCalendarItem:
      type: object
      required:
        - id
        - title
        - description
        - location
        - startDate
        - endDate
        - maxCapacity
        - priceMember
        - priceNonMember
        - isPublic
        - refundDays
        - status
        - announceDiscord
        - announceEmail
        - createdBy
        - interestCount
        - pendingRegistrationCount
        - confirmedRegistrationCount
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        maxCapacity:
          type: integer
          minimum: 0
          nullable: true
        priceMember:
          type: number
          description: "Member price in cents (persistence: `price_member`)."
          nullable: true
        priceNonMember:
          type: number
          description: "Non-member price in cents (persistence: `price_non_member`)."
          nullable: true
        isPublic:
          type: boolean
        refundDays:
          type: integer
          minimum: 0
        status:
          $ref: "#/components/schemas/WorkshopStatus"
        announceDiscord:
          type: boolean
        announceEmail:
          type: boolean
        createdBy:
          type: string
          format: uuid
          nullable: true
          description: Supabase auth user id of the Workshop creator, or null.
        interestCount:
          type: integer
          minimum: 0
          description: Number of members who have expressed interest in the Workshop.
        pendingRegistrationCount:
          type: integer
          minimum: 0
          description: Total pending registrations (counts toward availability).
        confirmedRegistrationCount:
          type: integer
          minimum: 0
          description: Total confirmed registrations (counts toward availability).
    WorkshopCalendarResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - workshops
          properties:
            workshops:
              type: array
              items:
                $ref: "#/components/schemas/WorkshopCalendarItem"
    Workshop:
      type: object
      required:
        - id
        - title
        - location
        - startDate
        - endDate
        - maxCapacity
        - priceMember
        - priceNonMember
        - isPublic
        - refundDays
        - status
        - interestCount
        - pendingRegistrationCount
        - confirmedRegistrationCount
        - currentUserInterest
        - currentUserRegistration
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        location:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        maxCapacity:
          type: integer
          minimum: 1
        priceMember:
          type: number
          description: Member price in cents (minor units).
        priceNonMember:
          type: number
          description: Non-member price in cents (minor units).
        isPublic:
          type: boolean
        refundDays:
          type: integer
          minimum: 0
        status:
          $ref: "#/components/schemas/WorkshopStatus"
        interestCount:
          type: integer
          minimum: 0
          description: Number of members who expressed interest (meaningful for planned Workshops).
        pendingRegistrationCount:
          type: integer
          minimum: 0
          description: Pending registrations counted toward availability.
        confirmedRegistrationCount:
          type: integer
          minimum: 0
          description: Confirmed registrations counted toward availability.
        currentUserInterest:
          type: boolean
          description: Whether the authenticated member expressed interest in this Workshop.
        currentUserRegistration:
          allOf:
            - $ref: "#/components/schemas/WorkshopRegistration"
          nullable: true
          description: The authenticated member's registration for this Workshop, or null.
      description: |
        Member-safe Workshop DTO. Exposes availability counts and the current
        user's interest/registration state, but never other attendees'
        identities or storage-shaped join details. Internal fields
        (`announceDiscord`, `announceEmail`, `createdBy`, timestamps) are
        omitted.
    WorkshopsListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - workshops
          properties:
            workshops:
              type: array
              items:
                $ref: "#/components/schemas/Workshop"
    WorkshopAttendee:
      type: object
      required:
        - id
        - status
        - attendanceStatus
        - amountPaid
        - currency
        - registeredAt
        - participant
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, confirmed]
          description: Only `pending` and `confirmed` registrations are returned as attendees.
        attendanceStatus:
          type: string
          enum: [pending, attended, no_show, excused]
          nullable: true
        attendanceMarkedAt:
          type: string
          format: date-time
          nullable: true
        attendanceMarkedBy:
          type: string
          format: uuid
          nullable: true
        attendanceNotes:
          type: string
          nullable: true
        amountPaid:
          type: integer
          description: Amount paid in the smallest currency unit (cents).
          nullable: true
        currency:
          type: string
          nullable: true
        registeredAt:
          type: string
          format: date-time
        confirmedAt:
          type: string
          format: date-time
          nullable: true
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        registrationNotes:
          type: string
          nullable: true
        participant:
          $ref: "#/components/schemas/WorkshopParticipant"
    WorkshopRefund:
      type: object
      required:
        - id
        - registrationId
        - refundAmount
        - status
        - requestedAt
        - participant
      properties:
        id:
          type: string
          format: uuid
        registrationId:
          type: string
          format: uuid
        refundAmount:
          type: integer
          description: Refund amount in the smallest currency unit (cents).
        refundReason:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, processing, completed, failed, cancelled]
        stripeRefundId:
          type: string
          nullable: true
        requestedAt:
          type: string
          format: date-time
        processedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        participant:
          $ref: "#/components/schemas/WorkshopParticipant"
    WorkshopParticipant:
      type: object
      required:
        - type
        - displayName
        - email
      properties:
        type:
          type: string
          enum: [member, external]
        displayName:
          type: string
        email:
          type: string
          format: email
          nullable: true
    Error:
      type: object
      properties:
        errors:
          type: object
          properties:
            detail:
              type: string

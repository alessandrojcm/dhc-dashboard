openapi: 3.0.3
info:
  title: DHC Dashboard API
  description: |
    Dublin Hema Club dashboard API.

    **Auth**: Phoenix validates Supabase JWT. Pass as `Authorization: Bearer <token>`.
  version: 0.1.0

servers:
  - url: /api
    description: Relative path (same origin)

paths:
  /health:
    get:
      operationId: health.index
      tags:
        - Health
      summary: Health check
      description: Returns a static status response. Used to verify the API is reachable.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        example: ok

  /webhooks/stripe:
    post:
      operationId: stripeWebhooks.create
      tags:
        - StripeWebhooks
      summary: Handle Stripe webhook events
      description: |
        Receives Stripe webhook events, validates the Stripe-Signature header
        using HMAC-SHA256, and enqueues an Oban job for background processing.

        This endpoint is unauthenticated — Stripe sends webhooks without auth tokens.
        Signature verification is the authentication mechanism.

        Returns 200 immediately after validation + enqueue (Stripe requires fast responses).
        Returns 400 for invalid or missing signatures.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: Stripe event ID (e.g. evt_1abc)
                object:
                  type: string
                  example: event
                type:
                  type: string
                  description: Stripe event type (e.g. charge.succeeded)
                  enum:
                    - charge.succeeded
                    - charge.expired
                    - charge.refunded
                    - customer.subscription.created
                    - customer.subscription.updated
                    - customer.subscription.deleted
                    - customer.subscription.paused
                    - customer.subscription.resumed
                    - customer.subscription.pending_update_applied
                    - customer.subscription.pending_update_expired
                    - customer.subscription.trial_will_end
                    - invoice.paid
                    - invoice.payment_failed
                    - invoice.payment_action_required
                    - invoice.upcoming
                    - invoice.marked_uncollectible
                    - invoice.payment_succeeded
                    - payment_intent.succeeded
                    - payment_intent.payment_failed
                    - payment_intent.canceled
                data:
                  type: object
                  description: Event payload
                created:
                  type: integer
                  description: Unix timestamp when the event was created
                livemode:
                  type: boolean
                  description: Whether the event was in live mode
                pending_webhooks:
                  type: integer
                  description: Number of pending webhooks
                request:
                  type: object
                  description: Request details (id and idempotency_key)
                api_version:
                  type: string
                  description: Stripe API version
      responses:
        "200":
          description: Event validated and enqueued for processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      received:
                        type: boolean
                        example: true
                      event_id:
                        type: string
                        description: Oban job ID
        "400":
          description: Invalid or missing Stripe signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /invitations:
    get:
      operationId: invitations.list
      tags:
        - Invitations
      summary: List member invitations
      description: |
        Returns a domain-shaped, cursor-paginated list of member invitations
        for the dashboard table.

        The server always filters to `pending` and `expired` invitations,
        matching the previous hardcoded client filter. The `status` field is
        still returned in the DTO so the UI can render the badge, but there is
        no `status` query param — `accepted`/`revoked` rows are never returned.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `admin`, `president`, or `committee_coordinator`.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            enum: [10, 25, 50, 100]
            default: 10
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque cursor returned by a previous response.
        - name: q
          in: query
          schema:
            type: string
          description: Websearch-style full text query over `invitations.search_text`.
        - name: sort
          in: query
          schema:
            $ref: "#/components/schemas/InvitationListSortField"
            default: createdAt
        - name: direction
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: Cursor-paginated member invitations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationListResponse"
        "400":
          description: Invalid query parameter or mismatched cursor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks an invitation admin role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: invitations.create
      tags:
        - Invitations
      summary: Enqueue bulk member invitations
      description: |
        Enqueues a Phoenix/Oban bulk invitation job. This replaces the
        `bulk_invite_with_subscription` Supabase edge function invocation.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `president`, `admin`, or `committee_coordinator`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvitationCreateRequest"
      responses:
        "202":
          description: Bulk invitation job accepted for background processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationCreateResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks an invitation admin role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /invitations/resend:
    post:
      operationId: invitations.resend
      tags:
        - Invitations
      summary: Resend existing member invitations
      description: |
        Re-enqueues invite-member emails through the Phoenix Email Oban worker.
        This replaces the SvelteKit service-layer `pgmq.send_batch('email_queue', ...)`
        producer used by invitation resend actions.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `president`, `admin`, or `committee_coordinator`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvitationResendCreateRequest"
      responses:
        "202":
          description: Resend emails accepted for background processing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvitationResendCreateResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks an invitation admin role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /waitlist/status:
    get:
      operationId: waitlist.status
      tags:
        - Waitlist
      summary: Read public waitlist status
      description: |
        Returns whether the public beginners workshop waitlist is currently open.

        This endpoint is public and intentionally exposes only the domain-shaped
        waitlist status, not the generic settings table.
      responses:
        "200":
          description: Waitlist status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistStatusResponse"

  /waitlist/analytics:
    get:
      operationId: waitlist.analytics
      tags:
        - Waitlist
      summary: Read waitlist analytics
      description: |
        Returns dashboard analytics for current beginners workshop waitlist entries.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `admin`, `president`, `committee_coordinator`, `beginners_coordinator`, or `coach`.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Waitlist analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistAnalyticsResponse"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks a waitlist admin role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /waitlist/entries:
    get:
      operationId: waitlist.entries
      tags:
        - Waitlist
      summary: List waitlist entries
      description: |
        Returns a domain-shaped, cursor-paginated list of beginners workshop
        waitlist entries for the dashboard table.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `admin`, `president`, `committee_coordinator`, `beginners_coordinator`, or `coach`.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            enum: [10, 25, 50, 100]
            default: 10
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque cursor returned by a previous response.
        - name: q
          in: query
          schema:
            type: string
          description: Websearch-style full text query.
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/WaitlistStatus"
          description: Defaults to all statuses except `joined`; pass `joined` explicitly to include joined entries only.
        - name: sort
          in: query
          schema:
            $ref: "#/components/schemas/WaitlistEntriesSortField"
            default: position
        - name: direction
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: Cursor-paginated waitlist entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaitlistEntriesResponse"
        "400":
          description: Invalid query parameter or mismatched cursor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks a waitlist admin role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /notifications:
    get:
      operationId: notifications.list
      tags:
        - Notifications
      summary: List current user notifications
      description: |
        Returns the authenticated user's in-app notifications in newest-first
        order plus the unread notification count. This endpoint mirrors the
        old `notifications.user_id = auth.uid()` RLS boundary: users can only
        read notifications generated for their own Supabase Auth user id.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            enum: [10, 25, 50]
            default: 10
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque cursor returned by a previous response.
      responses:
        "200":
          description: Cursor-paginated notifications for the authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsListResponse"
        "400":
          description: Invalid query parameter or mismatched cursor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /members:
    get:
      operationId: members.list
      tags:
        - Members
      summary: List members
      description: |
        Returns a domain-shaped, cursor-paginated list of members for the
        dashboard table, replacing the browser-side PostgREST read over
        `member_management_view`.

        `membershipStatus` is computed server-side, reproducing the legacy
        view's CASE: `inactive` when `user_profiles.is_active = false`;
        `paused` when `member_profiles.subscription_paused_until` is not null
        and greater than `now()`; otherwise `active`. This is distinct from
        the Member's `isActive` flag — a paused member has
        `isActive: true, membershipStatus: "paused"`.

        Member email is read directly from `auth.users` via the `AuthUser`
        schema (no PostgREST-era helper function). Internal/leaky fields
        (`searchText`, `userProfileId`, `createdAt`, `updatedAt`, `roles`,
        `additionalData`, `fromWaitlistId`, `waitlistRegistrationDate`) are
        not exposed.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of the
        broad committee roles: `admin`, `president`, `treasurer`,
        `committee_coordinator`, `sparring_coordinator`, `workshop_coordinator`,
        `beginners_coordinator`, `quartermaster`, `pr_manager`,
        `volunteer_coordinator`, `research_coordinator`, or `coach`. A `member`
        role 403s; a missing token 401s.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            enum: [10, 25, 50, 100]
            default: 10
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque cursor returned by a previous response. Binds to the query params (limit, sort, direction, membershipStatus, q); a mismatched cursor returns 400.
        - name: q
          in: query
          schema:
            type: string
          description: Websearch-style full text query over `user_profiles.search_text`.
        - name: membershipStatus
          in: query
          schema:
            type: string
          description: |
            Comma-separated list of membership statuses to include. Absent or
            empty returns all statuses (no filter). Example: `active,paused`.
            Valid values: `active`, `inactive`, `paused`.
        - name: sort
          in: query
          schema:
            $ref: "#/components/schemas/MembersListSortField"
            default: lastName
        - name: direction
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: Cursor-paginated members
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembersListResponse"
        "400":
          description: Invalid query parameter or mismatched cursor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks a broad committee role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /members/insurance-form:
    get:
      operationId: members.insuranceForm
      tags:
        - Members
      summary: Read the member insurance form link
      description: |
        Returns the URL of the HEMA insurance form link configured for members.

        Exposes a specific domain read, not a generic settings proxy: the
        `Dhc.Members` context owns the `hema_insurance_form_link` settings read.

        Any authenticated user (valid Supabase JWT) may read this; no committee
        role is required, mirroring the `settings` SELECT RLS policy
        (`USING (true)` for authenticated). A member can read the insurance
        form link on their own profile.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Insurance form link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembersInsuranceFormResponse"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /members/analytics:
    get:
      operationId: members.analytics
      tags:
        - Members
      summary: Read members analytics
      description: |
        Returns dashboard analytics for active members, computed server-side
        over `member_profiles` joined to `user_profiles` where `is_active = true`.

        Replaces the five browser-side PostgREST aggregate queries over
        `member_management_view` with a single domain-shaped read. The
        `preferred_weapon[]` array is unnested and counted in SQL so the
        browser no longer downloads every active member's weapon array to
        count it in JavaScript. Raw enum strings are returned for weapons;
        the UI keeps doing display prettification.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of the
        broad committee roles: `admin`, `president`, `treasurer`,
        `committee_coordinator`, `sparring_coordinator`, `workshop_coordinator`,
        `beginners_coordinator`, `quartermaster`, `pr_manager`,
        `volunteer_coordinator`, `research_coordinator`, or `coach`. This
        mirrors the `user_profiles` SELECT RLS policy for broad committee
        roles. A `member` role 403s; a missing token 401s.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Members analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembersAnalyticsResponse"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks a broad committee role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workshops/calendar:
    get:
      operationId: workshops.calendar
      tags:
        - Workshops
      summary: Read the coordinator Workshop calendar
      description: |
        Returns non-cancelled Workshops for the coordinator management
        calendar, replacing the browser-side PostgREST read over
        `club_activities` joined to `club_activity_interest_counts` and
        `club_activity_registrations`.

        Each Workshop carries scheduling, pricing, and status fields, the
        interest count, and total pending/confirmed registration counts —
        the demand and attendance signals a coordinator needs. The DTO does
        NOT carry current-user registration or interest state: the old
        `user_interest` / `user_registrations` PostgREST joins were
        current-user artifacts that leaked into the management view and are
        intentionally dropped (PRD #142).

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `workshop_coordinator`, `president`, or `admin`. This mirrors the
        corrected `club_activity_registrations` RLS policy
        (`20250923100806_fix_workshops_rls.sql`) and does NOT reproduce the
        historical `beginners_coordinator` registration-visibility drift.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Coordinator Workshop calendar
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkshopCalendarResponse"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks a workshop coordinator role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workshops/{id}/attendees:
    get:
      operationId: workshops.attendees
      tags:
        - Workshops
      summary: Read Workshop attendees and refunds
      description: |
        Returns the combined coordinator attendee/refund management payload for
        a single Workshop: the Workshop summary, the active attendees
        (registrations with status `confirmed` or `pending`, ordered by
        `registeredAt` ascending), and the refund records (ordered by
        `requestedAt` descending).

        Attendee and refund participants are normalized into a single domain
        `participant` DTO (`type` `member` | `external`, `displayName`,
        `email`) so member and external registrations are displayed
        consistently and the storage join shapes (`user_profiles` /
        `external_users`) do not leak into the contract.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `workshop_coordinator`, `president`, or `admin`. This mirrors the
        corrected registration RLS policy
        (`20250923100806_fix_workshops_rls.sql`) and deliberately does NOT
        reproduce the historical `beginners_coordinator` registration
        visibility drift (see the `Dhc.Workshops` moduledoc). A
        `beginners_coordinator` token 403s; a missing token 401s; an unknown
        Workshop id 404s.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The Workshop id.
      responses:
        "200":
          description: Workshop attendees and refunds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkshopAttendeesResponse"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks a Workshop coordinator management role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No Workshop exists for the given id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /workshops:
    get:
      operationId: workshops.list
      tags:
        - Workshops
      summary: List member-safe Workshops
      description: |
        Returns the member-safe Workshop collection, replacing the browser-side
        PostgREST reads over `club_activities` (with `club_activity_interest`
        and `club_activity_registrations` joins) on the member-facing My
        Workshops screen.

        The collection defaults to the member-visible active statuses —
        `planned` and `published` — so members see Workshops they can express
        interest in or register for. `finished` and `cancelled` Workshops are
        never returned to members.

        Any `status` filter is **constrained to member-safe statuses**: the
        endpoint intersects the requested statuses with `{planned, published}`,
        so a member can never craft a query that returns `finished` or
        `cancelled` Workshops. Unknown statuses are dropped (no `400`).

        Each Workshop DTO carries availability counts and the current user's
        state, computed server-side from the Supabase JWT `sub`:

          * `interestCount` — number of members who expressed interest
            (meaningful for `planned` Workshops).
          * `pendingRegistrationCount` / `confirmedRegistrationCount` —
            registrations counted toward availability (PRD #142 corrects the
            old `attendee_count` length, which counted every row including
            `cancelled`/`refunded`, to pending/confirmed only).
          * `currentUserInterest` — whether the authenticated member expressed
            interest in this Workshop.
          * `currentUserRegistration` — the authenticated member's registration
            (`{id, status}`) for this Workshop, or `null`. Returned regardless
            of status so the UI can derive "am I registered" and "was I
            refunded" state.

        Member-safe Workshop DTOs do **not** expose other attendee identities
        or storage-shaped join details (no `participant`, no `attendees`, no
        `member_user_id` lists). Those live behind the coordinator
        attendee/refund read.

        Any authenticated user (valid Supabase JWT) may read this; no committee
        role is required. A missing token returns `401`.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
          description: |
            Comma-separated list of Workshop statuses to include, constrained to
            the member-safe set `{planned, published}`. Absent or empty returns
            both `planned` and `published`. Any requested status outside the
            member-safe set is dropped (e.g. `?status=finished` returns no
            Workshops). Example: `planned`, `published`, `planned,published`.
      responses:
        "200":
          description: Member-safe Workshop collection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkshopsListResponse"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /inventory/overview:
    get:
      operationId: inventory.overview
      tags:
        - Inventory
      summary: Read Inventory overview counts
      description: |
        Returns the Inventory overview summary counts, replacing the
        SvelteKit server-side PostgREST reads over `containers`,
        `equipment_categories`, and `inventory_items` on the Inventory
        dashboard overview.

        The response carries four counts only:

          * `summary.containerCount` — number of storage Containers
          * `summary.categoryCount` — number of Equipment Categories
          * `summary.itemCount` — number of Inventory Items
          * `summary.maintenanceCount` — number of Inventory Items currently
            out for maintenance

        Inventory Activity (the `inventory_history` feed) is intentionally
        split out into a separate endpoint (PRD #93, ALE-95) so the overview
        stays light.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `quartermaster`, `president`, or `admin`. This mirrors the existing
        dashboard Inventory read gate. A member without an Inventory
        privilege receives `403`; a missing token returns `401`.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Inventory overview summary counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryOverviewResponse"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks an Inventory management role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /inventory/items/filters:
    get:
      operationId: inventory.filters
      tags:
        - Inventory
      summary: Read Inventory Item filter options
      description: |
        Returns the Equipment Category and Container options used to populate
        the Inventory Item list filter dropdowns, replacing the SvelteKit
        server-side `getFilterOptions()` read
        (`src/lib/server/services/inventory/item.service.ts`) which ran
        `selectAll()` over `equipment_categories` and `containers` ordered by
        `name`.

        The response mirrors the current filter-option payloads, camelCased,
        and is intentionally kept separate from the Inventory Item list
        response (PRD #93, ALE-98): the item list slice (ALE-follow-up) loads
        its rows independently, while this endpoint only feeds the category
        and container dropdown controls.

        Each Equipment Category option carries `id`, `name`, `description`,
        `availableAttributes` (the per-category attribute definition array),
        and `attributeSchema`. Each Container option carries `id`, `name`,
        `description`, and `parentContainerId`. Both arrays are ordered by
        `name` ascending, matching the previous `orderBy("name")` behaviour.

        Internal auth-user refs (`created_by`) and timestamps are not exposed
        here: the dropdowns only need `id` and `name`, and the
        `inserted_at`/`created_at` baseline divergence (see AGENTS.md) is
        outside this slice's scope.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `quartermaster`, `president`, or `admin` (the `inventory_admin_api`
        pipeline, mirroring the existing dashboard Inventory read gate). A
        member without an Inventory privilege receives `403`; a missing token
        returns `401`.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Inventory Item filter options (categories and containers)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItemFiltersResponse"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks an Inventory management role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /inventory/activity:
    get:
      operationId: inventory.activity
      tags:
        - Inventory
      summary: Read the Inventory Activity feed
      description: |
        Returns the Inventory Activity feed (the `inventory_history` table),
        newest-first, cursor-paginated with no total count.

        Each Inventory Activity entry carries the action (`created`, `moved`,
        `updated`, `maintenance_out`, `maintenance_in`), the acting user
        (`changedBy`), the affected Inventory Item (`itemId` + the nested
        `item` object with `id` and `attributes`), the optional old/new
        Container ids and the nested `oldContainer`/`newContainer` objects
        (each `{ id, name }` or `null`), freeform `notes`, and `createdAt`.

        Replaces the SvelteKit server-side PostgREST/Kysely read over
        `inventory_history` joined to `inventory_items` and `containers` on
        the Inventory dashboard overview
        (`src/routes/dashboard/inventory/+page.server.ts`).

        The feed is ordered by `createdAt desc, id desc` (deterministic
        tie-break). Pagination is forward-only via an opaque `cursor`: the
        response carries `nextCursor` (or `null` when there is no next page)
        and intentionally omits a total count — the overview counts already
        provide the summary totals, and the activity feed is an open-ended
        log, not a paginated table.

        Optional filters:

          * `itemId` — constrain the feed to a single Inventory Item
            (matches `inventory_history.item_id`).
          * `containerId` — constrain the feed to activities whose
            `oldContainerId` or `newContainerId` equals the given Container id.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `quartermaster`, `president`, or `admin` (the `inventory_admin_api`
        pipeline, mirroring the existing dashboard Inventory read gate). A
        member without an Inventory privilege receives `403`; a missing token
        returns `401`.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            enum: [10, 25, 50, 100]
            default: 10
        - name: cursor
          in: query
          schema:
            type: string
          description: Opaque cursor returned by a previous response. Binds to the query params (limit, itemId, containerId); a mismatched cursor returns 400.
        - name: itemId
          in: query
          schema:
            type: string
            format: uuid
          description: Filter the feed to a single Inventory Item.
        - name: containerId
          in: query
          schema:
            type: string
            format: uuid
          description: |
            Filter the feed to activities touching the given Container
            (matches either `oldContainerId` or `newContainerId`).
      responses:
        "200":
          description: Cursor-paginated Inventory Activity feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryActivityListResponse"
        "400":
          description: Invalid query parameter or mismatched cursor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks an Inventory management role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /inventory/categories:
    get:
      operationId: inventory.categories
      tags:
        - Inventory
      summary: Read the Equipment Category list
      description: |
        Returns the domain-shaped Equipment Category list, replacing the
        SvelteKit client-side Supabase/PostgREST read over `equipment_categories`
        (with an `equipment_items(count)` aggregate) on the Inventory
        categories dashboard
        (`src/routes/dashboard/inventory/categories/+page.svelte`).

        Each Equipment Category carries `id`, `name`, `description`,
        `availableAttributes` (the per-category attribute definition array),
        and `itemCount` (the number of Inventory Items in that category). The
        list is ordered by `name` ascending, matching the previous
        `.order("name")` behaviour.

        Internal auth-user refs (`created_by`) and timestamps are not exposed
        here: the categories management page only renders identity, metadata,
        and the item count. The `inserted_at`/`created_at` baseline divergence
        (see AGENTS.md) is outside this slice's scope.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `quartermaster`, `president`, or `admin` (the `inventory_admin_api`
        pipeline, mirroring the existing dashboard Inventory read gate). A
        member without an Inventory privilege receives `403`; a missing token
        returns `401`.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Equipment Category list with item counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryCategoryListResponse"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks an Inventory management role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /inventory/containers:
    get:
      operationId: inventory.containers
      tags:
        - Inventory
      summary: Read the Container list
      description: |
        Returns the flat, domain-shaped Container list, replacing the
        SvelteKit client-side Supabase/PostgREST read over `containers`
        (with a `parent_container:containers!fk(id, name)` join and an
        `equipment_items(count)` aggregate) on the Inventory containers
        dashboard (`src/routes/dashboard/inventory/containers/+page.svelte`).

        Each Container carries `id`, `name`, `description`,
        `parentContainerId`, `parentContainer` (the nested `{ id, name }`
        object for the parent Container, or `null` for a top-level
        Container), and `itemCount` (the number of Inventory Items directly
        in that Container). The list is ordered by `name` ascending, matching
        the previous `.order("name")` behaviour. The response is a flat array;
        the dashboard derives its hierarchy tree client-side.

        Internal auth-user refs (`created_by`) and timestamps are not exposed
        here: the containers management page only renders identity, parent
        Container, and the item count. The `inserted_at`/`created_at` baseline
        divergence (see AGENTS.md) is outside this slice's scope.

        Requires a Supabase JWT whose `app_metadata.roles` includes one of:
        `quartermaster`, `president`, or `admin` (the `inventory_admin_api`
        pipeline, mirroring the existing dashboard Inventory read gate). A
        member without an Inventory privilege receives `403`; a missing token
        returns `401`.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Flat Container list with parent and item counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryContainerListResponse"
        "401":
          description: Missing or invalid Supabase JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Authenticated user lacks an Inventory management role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    InventoryOverviewResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - summary
          properties:
            summary:
              type: object
              required:
                - containerCount
                - categoryCount
                - itemCount
                - maintenanceCount
              properties:
                containerCount:
                  type: integer
                  minimum: 0
                  description: Number of storage Containers.
                categoryCount:
                  type: integer
                  minimum: 0
                  description: Number of Equipment Categories.
                itemCount:
                  type: integer
                  minimum: 0
                  description: Number of Inventory Items.
                maintenanceCount:
                  type: integer
                  minimum: 0
                  description: Number of Inventory Items currently out for maintenance.
    InventoryOverviewSummary:
      type: object
      required:
        - containerCount
        - categoryCount
        - itemCount
        - maintenanceCount
      properties:
        containerCount:
          type: integer
          minimum: 0
        categoryCount:
          type: integer
          minimum: 0
        itemCount:
          type: integer
          minimum: 0
        maintenanceCount:
          type: integer
          minimum: 0
    InventoryActivityListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - activity
            - limit
            - nextCursor
          properties:
            activity:
              type: array
              items:
                $ref: "#/components/schemas/InventoryActivity"
            limit:
              type: integer
              enum: [10, 25, 50, 100]
            nextCursor:
              type: string
              nullable: true
              description: Opaque cursor for the next page, or null when there is no next page.
    InventoryActivity:
      type: object
      required:
        - id
        - action
        - changedBy
        - createdAt
        - itemId
        - oldContainerId
        - newContainerId
        - notes
        - item
        - oldContainer
        - newContainer
      description: |
        A single Inventory Activity entry. `item`, `oldContainer`, and
        `newContainer` are nullable: an `item` is null only if the Inventory
        Item row was deleted (cascading history is kept), and the container
        objects are null when the action did not involve that side of a move.
      properties:
        id:
          type: string
          format: uuid
        action:
          $ref: "#/components/schemas/InventoryAction"
        changedBy:
          type: string
          format: uuid
          description: Supabase auth user id of the user who performed the action.
        createdAt:
          type: string
          format: date-time
        itemId:
          type: string
          format: uuid
        oldContainerId:
          type: string
          format: uuid
          nullable: true
        newContainerId:
          type: string
          format: uuid
          nullable: true
        notes:
          type: string
          nullable: true
        item:
          allOf:
            - $ref: "#/components/schemas/InventoryActivityItem"
          nullable: true
        oldContainer:
          allOf:
            - $ref: "#/components/schemas/InventoryActivityContainer"
          nullable: true
        newContainer:
          allOf:
            - $ref: "#/components/schemas/InventoryActivityContainer"
          nullable: true
    InventoryActivityItem:
      type: object
      required:
        - id
        - attributes
      properties:
        id:
          type: string
          format: uuid
        attributes:
          type: object
          additionalProperties: true
          description: Per-item attribute values (e.g. brand, size). May be empty.
    InventoryActivityContainer:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    InventoryItemFiltersResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - categories
            - containers
          properties:
            categories:
              type: array
              description: >
                Equipment Category options for the Inventory Item list
                category dropdown, ordered by `name` ascending. Mirrors the
                previous `equipment_categories` `selectAll()` payload,
                camelCased.
              items:
                $ref: "#/components/schemas/InventoryItemFilterCategory"
            containers:
              type: array
              description: >
                Container options for the Inventory Item list container
                dropdown, ordered by `name` ascending. Mirrors the previous
                `containers` `selectAll()` payload, camelCased.
              items:
                $ref: "#/components/schemas/InventoryItemFilterContainer"
    InventoryItemFilterCategory:
      type: object
      required:
        - id
        - name
        - description
        - availableAttributes
        - attributeSchema
      description: |
        A single Equipment Category filter option. Carries the fields the
        Inventory Item list dropdown and any future attribute-driven filter
        UI need; internal timestamps and auth-user refs are not exposed.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        availableAttributes:
          type: array
          description: >
            Per-category attribute definitions (e.g. brand, size). Matches
            the `InventoryAttributeDefinition[]` shape consumed by the
            SvelteKit form helpers. May be empty.
          items:
            type: object
            additionalProperties: true
        attributeSchema:
          type: object
          additionalProperties: true
          description: JSON Schema describing valid attribute value shapes. May be empty.
    InventoryItemFilterContainer:
      type: object
      required:
        - id
        - name
        - description
        - parentContainerId
      description: |
        A single Container filter option. Carries the fields the Inventory
        Item list dropdown needs; internal timestamps and the `created_by`
        auth-user ref are not exposed.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        parentContainerId:
          type: string
          format: uuid
          nullable: true
          description: Parent Container id for hierarchical display, or null for a top-level Container.
    InventoryCategoryListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - categories
          properties:
            categories:
              type: array
              description: >
                Equipment Categories ordered by `name` ascending. Replaces the
                previous `equipment_categories` Supabase/PostgREST read
                (with an `equipment_items(count)` aggregate) on the Inventory
                categories dashboard, camelCased.
              items:
                $ref: "#/components/schemas/InventoryCategory"
    InventoryCategory:
      type: object
      required:
        - id
        - name
        - description
        - availableAttributes
        - itemCount
      description: |
        A single Equipment Category with its Inventory Item count. Carries
        the fields the categories management page renders (identity, metadata,
        and the item count); internal timestamps and auth-user refs are not
        exposed.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        availableAttributes:
          type: array
          description: >
            Per-category attribute definitions (e.g. brand, size). Matches
            the `InventoryAttributeDefinition[]` shape consumed by the
            SvelteKit form helpers. May be empty.
          items:
            type: object
            additionalProperties: true
        itemCount:
          type: integer
          minimum: 0
          description: Number of Inventory Items in this Equipment Category.
    InventoryContainerListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - containers
          properties:
            containers:
              type: array
              description: >
                Containers ordered by `name` ascending. Replaces the previous
                `containers` Supabase/PostgREST read (with a
                `parent_container:containers!fk(id, name)` join and an
                `equipment_items(count)` aggregate) on the Inventory containers
                dashboard, camelCased. The response is a flat array; the
                dashboard derives its hierarchy tree client-side.
              items:
                $ref: "#/components/schemas/InventoryContainer"
    InventoryContainer:
      type: object
      required:
        - id
        - name
        - description
        - parentContainerId
        - parentContainer
        - itemCount
      description: |
        A single Container with its parent Container (or `null` for a
        top-level Container) and the number of Inventory Items directly in
        it. Carries the fields the containers management page renders
        (identity, parent, and the item count); internal timestamps and
        auth-user refs are not exposed.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        parentContainerId:
          type: string
          format: uuid
          nullable: true
          description: Parent Container id, or null for a top-level Container.
        parentContainer:
          description: >
            The nested parent Container object (`{ id, name }`), or `null`
            for a top-level Container. The dashboard uses this for direct
            parent-name display; the hierarchy tree is derived client-side
            from the flat list.
          allOf:
            - $ref: "#/components/schemas/InventoryContainerParent"
          nullable: true
        itemCount:
          type: integer
          minimum: 0
          description: Number of Inventory Items directly in this Container.
    InventoryContainerParent:
      type: object
      required:
        - id
        - name
      description: >
        The minimal parent Container object (`{ id, name }`) nested inside
        `InventoryContainer.parentContainer`. Mirrors the previous
        `parent_container:containers!fk(id, name)` join shape, camelCased.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    InventoryAction:
      type: string
      enum:
        - created
        - moved
        - updated
        - maintenance_out
        - maintenance_in
      description: |
        Inventory Activity action (persistence: `inventory_action` Postgres
        enum). `created` is the item-creation event; `moved` records a
        container change (carries `oldContainerId`/`newContainerId`);
        `updated` is a generic attribute/quantity update; `maintenance_out`
        / `maintenance_in` mark an item leaving for / returning from
        maintenance.
    InvitationCreateRequest:
      type: object
      required:
        - invites
      properties:
        invites:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/InvitationCreateInvite"
    InvitationCreateInvite:
      type: object
      required:
        - firstName
        - lastName
        - email
        - phoneNumber
        - dateOfBirth
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phoneNumber:
          type: string
        dateOfBirth:
          type: string
          format: date
    InvitationCreateResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            queued:
              type: boolean
              example: true
            job_id:
              type: integer
              description: Oban job ID
    InvitationResendCreateRequest:
      type: object
      required:
        - emails
      properties:
        emails:
          type: array
          minItems: 1
          items:
            type: string
            format: email
    InvitationResendCreateResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            succeeded:
              type: integer
            failed:
              type: integer
    InvitationStatus:
      type: string
      enum:
        - pending
        - accepted
        - expired
        - revoked
      description: |
        Invitation lifecycle status. The list endpoint always filters to
        `pending` and `expired`; `accepted`/`revoked` rows are never returned.
        The field is still present in the DTO for UI badge rendering.
    InvitationListSortField:
      type: string
      enum:
        - email
        - status
        - expiresAt
        - createdAt
    InvitationListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - invitations
            - totalCount
            - limit
            - nextCursor
            - previousCursor
          properties:
            invitations:
              type: array
              items:
                $ref: "#/components/schemas/Invitation"
            totalCount:
              type: integer
              minimum: 0
              description: Exact `COUNT(*)`, not estimated.
            limit:
              type: integer
              enum: [10, 25, 50, 100]
            nextCursor:
              type: string
              nullable: true
            previousCursor:
              type: string
              nullable: true
    Invitation:
      type: object
      required:
        - id
        - email
        - status
        - expiresAt
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        status:
          $ref: "#/components/schemas/InvitationStatus"
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    WaitlistStatusResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - isOpen
          properties:
            isOpen:
              type: boolean
              description: Whether the public waitlist accepts registrations.
    WaitlistAnalyticsResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - totalCount
            - averageAge
            - genderDistribution
            - ageDistribution
          properties:
            totalCount:
              type: integer
              minimum: 0
            averageAge:
              type: number
              format: double
              minimum: 0
            genderDistribution:
              type: array
              items:
                $ref: "#/components/schemas/WaitlistGenderDistributionItem"
            ageDistribution:
              type: array
              items:
                $ref: "#/components/schemas/WaitlistAgeDistributionItem"
    WaitlistGenderDistributionItem:
      type: object
      required:
        - gender
        - value
      properties:
        gender:
          type: string
        value:
          type: integer
          minimum: 0
    WaitlistAgeDistributionItem:
      type: object
      required:
        - age
        - value
      properties:
        age:
          type: integer
          minimum: 0
        value:
          type: integer
          minimum: 0
    WaitlistStatus:
      type: string
      enum:
        - waiting
        - invited
        - paid
        - deferred
        - cancelled
        - completed
        - no_reply
        - joined
    MembershipStatus:
      type: string
      enum:
        - active
        - inactive
        - paused
      description: |
        Membership lifecycle state for a member profile.

        - `active`: the membership is currently in good standing.
        - `inactive`: the membership has lapsed or been ended.
        - `paused`: the membership is temporarily suspended (e.g. via
          `subscription_paused_until`). Mirrors the paused-subscription case
          in the legacy `member_management_view` `membership_status` column.

        Referenced later by the members-list DTO `membershipStatus` field and
        the `membershipStatus` query parameter of the members-list endpoint.
    MembersListSortField:
      type: string
      enum:
        - firstName
        - lastName
        - email
        - phoneNumber
        - age
        - membershipStartDate
        - lastPaymentDate
        - subscriptionPausedUntil
        - isActive
    MembersListResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - members
            - totalCount
            - limit
            - nextCursor
            - previousCursor
          properties:
            members:
              type: array
              items:
                $ref: "#/components/schemas/Member"
            totalCount:
              type: integer
              minimum: 0
            limit:
              type: integer
              enum: [10, 25, 50, 100]
            nextCursor:
              type: string
              nullable: true
            previousCursor:
              type: string
              nullable: true
    Member:
      type: object
      required:
        - id
        - firstName
        - lastName
        - email
        - phoneNumber
        - gender
        - pronouns
        - isActive
        - preferredWeapon
        - membershipStartDate
        - membershipEndDate
        - lastPaymentDate
        - insuranceFormSubmitted
        - age
        - socialMediaConsent
        - nextOfKinName
        - nextOfKinPhone
        - guardianFirstName
        - guardianLastName
        - guardianPhoneNumber
        - medicalConditions
        - subscriptionPausedUntil
        - membershipStatus
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phoneNumber:
          type: string
          nullable: true
        gender:
          type: string
          nullable: true
        pronouns:
          type: string
          nullable: true
        isActive:
          type: boolean
        preferredWeapon:
          type: array
          items:
            type: string
          description: Raw enum strings (the UI prettifies for display).
        membershipStartDate:
          type: string
          format: date-time
          nullable: true
        membershipEndDate:
          type: string
          format: date-time
          nullable: true
        lastPaymentDate:
          type: string
          format: date-time
          nullable: true
        insuranceFormSubmitted:
